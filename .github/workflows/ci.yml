name: ci

on: [pull_request]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  code_check:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repository
        uses: actions/checkout@v4

      - name: 📦 Install
        uses: ./.github/actions/install

      - name: 🎨 Format
        run: pnpm format

      - name: ✂️ Knip
        run: pnpm knip

      - name: 🚨 Lint
        run: pnpm lint

      - name: 🏷️ Typecheck
        run: pnpm typecheck

      - name: ✅ Coverage
        run: pnpm coverage

      - name: 🗄️ Push DB Schema
        run: pnpm db:push

      - name: 🏗 Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: code_check

    steps:
      - name: 🏗 Setup Repository
        uses: actions/checkout@v4

      - name: 📦 Install
        uses: ./.github/actions/install

      - name: 🎭 Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: 🗄️ Push DB Schema
        run: pnpm db:push

      - name: 🏗 Build
        run: pnpm build

      - name: 🎭 E2E Tests
        run: pnpm e2e

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
