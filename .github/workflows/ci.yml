name: ci

on: [pull_request]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  code_check:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repository
        uses: actions/checkout@v4

      - name: 📦 Install
        uses: ./.github/actions/install

      - name: 🎨 Format
        run: pnpm format

      - name: ✂️ Knip
        run: pnpm knip

      - name: 🚨 Lint
        run: pnpm lint

      - name: 🏷️ Typecheck
        run: pnpm typecheck

      - name: ✅ Coverage
        run: pnpm coverage
