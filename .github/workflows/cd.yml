name: ci

on: [pull_request]

jobs:
  code_check:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repository
        uses: actions/checkout@v4

      - name: 📦 Install
        uses: ./.github/actions/install

      - name: 🚨 Lint
        run: pnpm lint

      - name: 🎨 Format
        run: pnpm format

      - name: ✅ Coverage
        run: pnpm coverage
